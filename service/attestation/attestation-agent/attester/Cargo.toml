[package]
name = "attester"
version = "0.1.0"
edition = "2021"

[features]
itrustee-attester = ["base64-url", "rand", "sha2"]
virtcca-attester = ["base64-url", "ciborium", "cose-rust", "hex", "rand"]
cca-attester = ["base64-url"]

[dependencies]
anyhow.workspace = true
serde.workspace = true
serde_json.workspace = true
rand = { workspace = true, optional = true }
base64-url = { workspace = true, optional = true }
async-trait.workspace = true
log.workspace = true
attestation-types.workspace = true
sha2 = { workspace = true, optional = true }
strum.workspace = true
tempfile.workspace = true
thiserror.workspace = true
openssl-sys.workspace = true
ciborium = { workspace = true, optional = true }
cose-rust = { workspace = true, optional = true }
hex = { workspace = true, optional = true }
